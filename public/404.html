<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lorem Ipsum — Lorem Ipsum Dolor</title>
    <!--
      Single-page site served at the root, so the only valid URL is "/".
      GitHub Pages serves this file for any other path (typos, stale links);
      send the visitor home. No SPA route-encoding needed — there are no routes.
    -->
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      window.location.replace('/')
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/">home</a>…</p>
  </body>
</html>
